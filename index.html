<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Calculator</h1>
    <div id="input_area">
        <select name="option" id="operation">
        <option value="Sum">Sum</option>
        <option value="Rest">Rest</option>
        <option value="Multip">Multip</option>
        <option value="Div">Div</option>
        </select>
        <input type="text" id="number_1" placeholder="Add a number">
        <span id="symbol"></span>
        <input type="text" id="number_2" placeholder="Add a number">
    </div>
    <button id="calculate_button">Calculate</button>
<script src="code.js"></script>
</body>
</html>
