<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="total_area">
    <h1>Calculator</h1>
    <div id="calculator_style">
    <div id="result_area"></div>

    <div id="input_area">
        <div id="buttons_area">
            <button>Sum</button>
            <button>Rest</button>
            <button>Multi</button>
            <button>Div</button>
            <button>x^a</button>
            <button>Root</button>
        </div>
        <div id="input_values">
            <input type="text" id="number_1" placeholder="Add a number">
            <span id="symbol"></span>
            <input type="text" id="number_2" placeholder="Add a number">
        </div>
    </div>

    <button id="calculate_button">Calculate</button>
    </div>
    </div>
<script src="code.js"></script>
</body>
</html>
